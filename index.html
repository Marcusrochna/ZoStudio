<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZO Studio | Coming Soon</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
min-height:100vh;
font-family:Arial,sans-serif;
background:#f4efe8;
color:#1c1b18;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
position:relative;
}

body:before{
content:"";
position:fixed;
inset:-20%;
background:
linear-gradient(120deg,transparent 0 18%,rgba(0,0,0,.12) 19%,transparent 22%),
linear-gradient(120deg,transparent 0 32%,rgba(0,0,0,.08) 33%,transparent 36%),
linear-gradient(30deg,transparent 0 25%,rgba(0,0,0,.07) 26%,transparent 29%);
filter:blur(5px);
opacity:.55;
transform:translateX(-28%);
}

.page{
position:relative;
z-index:1;
width:min(900px,92vw);
padding:45px 20px;
animation:fade .8s ease both;
}

.logo{
width:175px;
max-width:65%;
height:auto;
margin:0 auto 75px;
display:block;
}

h1{
font-family:Georgia,serif;
font-weight:400;
font-size:clamp(58px,8vw,100px);
line-height:.95;
margin-bottom:30px;
}

.line{
width:70px;
height:1px;
background:#1c1b18;
opacity:.45;
margin:0 auto 30px;
}

.subtitle{
font-size:22px;
font-weight:300;
margin-bottom:44px;
}

form{
width:min(680px,100%);
margin:0 auto 52px;
display:grid;
grid-template-columns:1fr 230px;
gap:18px;
}

input{
height:64px;
border:1px solid rgba(0,0,0,.25);
background:rgba(255,255,255,.3);
padding:0 24px;
font-size:18px;
outline:none;
}

button{
height:64px;
border:none;
background:#1f1e1b;
color:white;
font-size:17px;
cursor:pointer;
}

.icons{
display:flex;
justify-content:center;
gap:46px;
margin-bottom:64px;
}

.icons a{
color:#1c1b18;
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
}

.icons svg{
width:32px;
height:32px;
stroke:currentColor;
}

footer{
font-size:15px;
color:#5d5850;
}

@keyframes fade{
from{opacity:0;transform:translateY(14px)}
to{opacity:1;transform:translateY(0)}
}

@media(max-width:720px){
form{grid-template-columns:1fr}
.logo{margin-bottom:55px}
button{width:100%}
}
</style>
</head>

<body>
<main class="page">

<img src="zo-logo.png" alt="ZO Studio Logo" class="logo" />

<h1>Coming Soon</h1>
<div class="line"></div>

<p class="subtitle">We’re crafting something beautiful.</p>

<form action="https://formsubmit.co/Ardy@thezostudio.com" method="POST">
<input type="email" name="email" placeholder="Enter your email" required />
<input type="hidden" name="_subject" value="New ZO Studio Email Signup" />
<input type="hidden" name="_captcha" value="false" />
<button type="submit">Notify Me</button>
</form>

<div class="icons">
<a href="https://www.instagram.com/the.zostudio/" target="_blank" aria-label="Instagram">
<svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="3" width="18" height="18" rx="5"></rect>
<circle cx="12" cy="12" r="4"></circle>
<circle cx="17.2" cy="6.8" r=".8" fill="currentColor" stroke="none"></circle>
</svg>
</a>

<a href="mailto:Ardy@thezostudio.com" aria-label="Email">
<svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
<rect x="3" y="5" width="18" height="14" rx="1.5"></rect>
<path d="M4 7l8 6 8-6"></path>
</svg>
</a>
</div>

<footer>© 2026 ZO Studio. All rights reserved.</footer>

</main>
</body>
</html>
