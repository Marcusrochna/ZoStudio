<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZO Studio | Coming Soon</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f4efe8;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(115deg, transparent 0%, transparent 48%, rgba(0,0,0,.08) 49%, transparent 51%),
        linear-gradient(125deg, transparent 0%, transparent 56%, rgba(0,0,0,.06) 57%, transparent 59%),
        linear-gradient(105deg, transparent 0%, transparent 64%, rgba(0,0,0,.045) 65%, transparent 67%);
      opacity: .45;
      filter: blur(2px);
      transform: scale(1.2);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 40px 24px;
    }

    .logo {
      width: 190px;
      max-width: 70%;
      margin-bottom: 80px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(48px, 7vw, 90px);
      font-weight: 400;
      margin: 0;
      letter-spacing: .02em;
    }

    .line {
      width: 70px;
      height: 1px;
      background: #222;
      margin: 36px auto;
      opacity: .6;
    }

    .subtitle {
      font-size: 22px;
      letter-spacing: .02em;
      margin-bottom: 42px;
      color: #333;
    }

    form {
      display: flex;
      justify-content: center;
      gap: 18px;
      max-width: 680px;
      margin: 0 auto 54px;
    }

    input {
      width: 100%;
      padding: 20px 24px;
      border: 1px solid rgba(0,0,0,.22);
      background: rgba(255,255,255,.35);
      font-size: 18px;
      outline: none;
      color: #222;
    }

    button {
      min-width: 220px;
      border: none;
      background: #222;
      color: white;
      font-size: 18px;
      letter-spacing: .03em;
      cursor: pointer;
      transition: opacity .2s ease;
    }

    button:hover {
      opacity: .85;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 52px;
      font-size: 28px;
      margin-bottom: 70px;
    }

    .socials a {
      color: #222;
      text-decoration: none;
    }

    footer {
      font-size: 16px;
      opacity: .75;
    }

    @media (max-width: 700px) {
      .logo {
        margin-bottom: 60px;
      }

      form {
        flex-direction: column;
      }

      button {
        width: 100%;
        padding: 20px;
      }

      .socials {
        margin-bottom: 50px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <img src="zo-logo.png" alt="ZO Studio Logo" class="logo" />

    <h1>Coming Soon</h1>

    <div class="line"></div>

    <p class="subtitle">We’re crafting something beautiful.</p>

    <form action="https://formsubmit.co/Ardy@thezostudio.com" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required />
      <input type="hidden" name="_subject" value="New ZO Studio Email Signup" />
      <input type="hidden" name="_captcha" value="false" />
      <button type="submit">Notify Me</button>
    </form>

    <div class="socials">
      <a href="https://www.instagram.com/the.zostudio/" target="_blank">◎</a>
      <a href="mailto:Ardy@thezostudio.com">✉</a>
    </div>

    <footer>© 2026 ZO Studio. All rights reserved.</footer>
  </main>
</body>
</html>
